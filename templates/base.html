<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTA Performance Dashboard</title>
  <link rel="stylesheet" href="/static/dashboard.css?v={{ v }}"/>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <span class="site-title">CTA / Managed Futures</span>
    <span class="site-subtitle muted">Performance Dashboard</span>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" data-tab="overview">Overview</button>
  <button class="tab-btn" data-tab="timeseries">Timeseries</button>
  <button class="tab-btn" data-tab="calendar">Calendar</button>
  <button class="tab-btn" data-tab="stats">Risk / Stats</button>
  <button class="tab-btn" data-tab="relative">Relative</button>
  <button class="tab-btn" data-tab="universe">Universe</button>
  <button class="tab-btn" data-tab="corr">Correlation</button>
</nav>

<main class="tab-container">
  <div id="tab-overview"    class="tab-panel active">{% include "tab_overview.html" %}</div>
  <div id="tab-timeseries"  class="tab-panel">{% include "tab_timeseries.html" %}</div>
  <div id="tab-calendar"    class="tab-panel">{% include "tab_calendar.html" %}</div>
  <div id="tab-stats"       class="tab-panel">{% include "tab_stats.html" %}</div>
  <div id="tab-relative"    class="tab-panel">{% include "tab_relative.html" %}</div>
  <div id="tab-universe"    class="tab-panel">{% include "tab_universe.html" %}</div>
  <div id="tab-corr"        class="tab-panel">{% include "tab_corr.html" %}</div>
</main>

<!-- Fund Detail Modal -->
<div id="fund-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modal-title" class="modal-fund-name"></span>
      <button class="modal-close" onclick="App.closeModal()">&#x2715;</button>
    </div>
    <div id="modal-body" class="modal-body">
      <div class="modal-loading">Loading…</div>
    </div>
  </div>
</div>

<script src="/static/dashboard.js?v={{ v }}"></script>
</body>
</html>
