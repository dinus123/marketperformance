<!-- Overview Tab -->
<div class="tab-controls" style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">
  <span id="overview-last-updated" class="muted" style="font-size:11px;">Last updated: —</span>
  <button id="refresh-btn" class="btn-secondary" onclick="App.overviewTab.refresh()">Refresh Data</button>
  <span id="refresh-spinner" style="display:none;font-size:11px;color:var(--warning);">Refreshing…</span>
</div>

<div id="overview-loading" class="loading-msg" style="display:none;">Loading…</div>

<div style="overflow-x:auto;">
<table id="overview-table" class="data-table">
  <thead>
    <tr>
      <th class="sortable" data-col="name">Fund</th>
      <th class="sortable" data-col="manager">Manager</th>
      <th class="sortable" data-col="type">Type</th>
      <th>CCY</th>
      <th class="sortable num-col" data-col="mtd">MTD</th>
      <th class="sortable num-col" data-col="prev_month">Prev Mo</th>
      <th class="sortable num-col" data-col="qtd">QTD</th>
      <th class="sortable num-col" data-col="prev_qtr">Prev Qtr</th>
      <th class="sortable num-col" data-col="ytd">YTD</th>
      <th class="sortable num-col" data-col="ret_12m">12M</th>
      <th class="sortable num-col" data-col="ret_2025">2025</th>
      <th class="sortable num-col" data-col="ret_2024">2024</th>
      <th class="sortable num-col" data-col="ret_2023">2023</th>
      <th class="sortable num-col" data-col="vol">Vol</th>
      <th data-col="aum">AUM</th>
      <th data-col="inception">Inception</th>
    </tr>
  </thead>
  <tbody id="overview-body"></tbody>
</table>
</div>
